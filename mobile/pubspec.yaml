name: nypd_study_guide
description: NYPD Sergeant Promotional Exam Study Guide
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.0
  flutter_card_swiper: ^7.0.0
  path_provider: ^2.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.0
  mockito: ^5.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/study_data.json
    - assets/data/chapters/