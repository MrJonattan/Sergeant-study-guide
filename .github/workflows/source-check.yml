name: Check NYPD Manual Source Updates

on:
  schedule:
    # Run on the 1st of every month at 9:00 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check-source-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run source check script
        id: check
        run: |
          node scripts/check-source-updates.mjs > check-output.txt 2>&1 || true
          cat check-output.txt

      - name: Check for changes
        id: changes
        run: |
          if grep -q "No changes detected" check-output.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes detected in NYPD manual source."
            exit 0
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "⚠️ Changes detected in NYPD manual source!"
          fi

      - name: Extract change details
        if: steps.changes.outputs.has_changes == 'true'
        id: extract
        run: |
          # Extract the date from the output
          TODAY=$(date +%Y-%m-%d)
          echo "date=$TODAY" >> $GITHUB_OUTPUT

          # Extract changed files
          CHANGED_FILES=$(grep -E "^📄 .* \(.*\)$" check-output.txt | sed 's/📄 /- /g' || echo "Unable to extract changed files")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Extract hash changes
          HASH_CHANGES=$(grep -A2 "Old hash:" check-output.txt || echo "Hash details not available")
          echo "hash_changes<<EOF" >> $GITHUB_OUTPUT
          echo "$HASH_CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Extract timeline excerpt (if Update1.pdf changed)
          if grep -q "Update1.pdf" check-output.txt; then
            echo "timeline_changed=true" >> $GITHUB_OUTPUT
          else
            echo "timeline_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Close existing source update issues
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any existing source update issues to avoid duplicates
          gh issue list --state open --search "NYPD manual updated" --json number,title --jq '.[] | "\(.number)"' | while read -r issue_num; do
            gh issue close "$issue_num" --comment "Closing to create updated issue with latest changes."
          done || true

      - name: Create GitHub Issue for review
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=${{ steps.extract.outputs.date }}

          gh issue create \
            --title "NYPD manual updated — review needed ($TODAY)" \
            --body "$(cat <<'EOF'
## 🚨 Source Update Detected

The NYPD Department Manual source files have been updated. This issue tracks the required review and update process.

### Source Information
- **Source URL:** https://www.nyc.gov/site/nypd/about/about-nypd/manual.page
- **Download Base:** https://www.nyc.gov/assets/nypd/downloads/pdf/public_information

---

## 📄 Changed Files

${{ steps.extract.outputs.changed_files }}

---

## 🔐 Hash Changes

\`\`\`
${{ steps.extract.outputs.hash_changes }}
\`\`\`

---

## 📅 Update Timeline

${{ steps.extract.outputs.timeline_changed == 'true' && '⚠️ Update1.pdf (Department Manual Update Timeline) has changed. Review the timeline document for official amendment details.' || 'ℹ️ Update1.pdf unchanged or not available.' }}

---

## ✅ Review Checklist

- [ ] Download changed PDF(s) from the source URLs
- [ ] Identify which procedures/content have changed
- [ ] Compare against existing chapters in this study guide
- [ ] Update affected chapters with review notes
- [ ] Update `source-manifest.json` with new hashes
- [ ] Close this issue once manifest is updated

---

## 📝 Notes

This issue was automatically generated by the `source-check.yml` workflow.

**DO NOT** auto-update the manifest — this ensures the issue remains open until a human reviews and deliberately ingests the changes.

---

*Generated on $TODAY*
EOF
)"
