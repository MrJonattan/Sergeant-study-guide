name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run --filter @nypd-sergeant/web typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build core
        run: pnpm run build:core

      - name: Build web app (includes typecheck)
        run: pnpm run build:web

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Build PDF
        run: pnpm run build:pdf
