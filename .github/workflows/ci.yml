name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm run build:core

      - name: Build web app
        run: pnpm run build:web

      - name: Type check
        run: pnpm run --filter @nypd-sergeant/web type-check

      - name: Lint
        run: pnpm run lint
