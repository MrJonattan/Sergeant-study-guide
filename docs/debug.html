<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body>
<h1>Debug Test</h1>
<div id="output"></div>
<script src="data.js?v=1"></script>
<script>
try {
  const D = window.STUDY_DATA;
  document.getElementById('output').innerHTML = `
    <p>Chapters loaded: ${D.chapters.length}</p>
    <p>First chapter: ${D.chapters[0].title}</p>
    <p>Exam questions: ${D.examQuestions.length}</p>
  `;
} catch(e) {
  document.getElementById('output').innerHTML = `<p style="color:red">Error: ${e.message}</p>`;
}
</script>
</body>
</html>
